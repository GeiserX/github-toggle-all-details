<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#24292E"/>
      <stop offset="100%" stop-color="#58A6FF"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#79C0FF"/>
      <stop offset="100%" stop-color="#58A6FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="40" x2="900" y2="40" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="80" x2="900" y2="80" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="120" x2="900" y2="120" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="160" x2="900" y2="160" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Toggle/expand icon group -->
  <g transform="translate(60, 58)">
    <!-- Outer rounded rect (card) -->
    <rect x="0" y="0" width="84" height="84" rx="16" fill="none" stroke="url(#iconGrad)" stroke-width="3" opacity="0.9"/>

    <!-- Top details element (open) -->
    <polygon points="18,24 30,36 42,24" fill="#79C0FF" opacity="0.9"/>
    <line x1="18" y1="40" x2="66" y2="40" stroke="#79C0FF" stroke-width="2" opacity="0.5"/>

    <!-- Bottom details element (closed) -->
    <polygon points="18,52 30,64 42,52" fill="#58A6FF" opacity="0.6"/>
    <line x1="18" y1="68" x2="50" y2="68" stroke="#58A6FF" stroke-width="2" opacity="0.3"/>

    <!-- Toggle arrows on right side -->
    <g transform="translate(58, 28)">
      <polyline points="0,4 8,0 0,-4" fill="none" stroke="#79C0FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g transform="translate(58, 58)">
      <polyline points="8,4 0,0 8,-4" fill="none" stroke="#58A6FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    </g>
  </g>

  <!-- Title text -->
  <text x="180" y="95" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace" font-size="32" font-weight="700" fill="#E6EDF3" letter-spacing="-0.5">
    github-toggle-all-details
  </text>

  <!-- Subtitle -->
  <text x="180" y="128" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" fill="#8B949E" font-weight="400">
    Bulk-toggle collapsible sections in GitHub comments
  </text>

  <!-- Decorative accent line -->
  <rect x="180" y="138" width="60" height="3" rx="1.5" fill="#58A6FF" opacity="0.6"/>
</svg>
